<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mission Control</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="shell compact">
      <section class="hero">
        <div>
          <p class="eyebrow">mission control</p>
          <h1>Run the draw</h1>
          <p class="brief">This page triggers assignment but never prints the role list.</p>
        </div>
        <div class="stamp" aria-hidden="true">
          <span>NO</span>
          <span>PEEKING</span>
        </div>
      </section>

      <section class="status-line" id="statusLine" aria-live="polite">
        Checking roster...
      </section>

      <form class="panel" id="drawForm">
        <div class="panel-header">
          <p class="eyebrow">authorization</p>
          <h2>Classified trigger</h2>
        </div>

        <label>
          Admin secret
          <input name="adminSecret" type="password" autocomplete="current-password" required placeholder="Cloudflare ADMIN_SECRET">
        </label>

        <label>
          Registered agent exact name
          <input name="removeName" type="text" maxlength="80" placeholder="Name they signed up with">
        </label>

        <details class="admin-options">
          <summary>Endgame reveal options</summary>
          <label class="check">
            <input name="showAssignedRoles" type="checkbox">
            <span>Show assigned roles in the registered agents list</span>
          </label>
        </details>

        <button class="primary" type="submit">Run draw</button>
        <div class="button-stack">
          <button type="button" id="rosterButton">Show registered agents</button>
          <button type="button" id="rolesButton">Show role count</button>
          <button type="button" id="previewDossierButton">Preview sample dossier</button>
          <button type="button" id="reissueLinkButton">Reissue named agent reveal link</button>
          <button type="button" id="removeAgentButton">Remove named agent</button>
          <button type="button" id="clearDrawButton">Discard draw</button>
          <button type="button" id="redrawButton">Discard draw and redraw</button>
          <button type="button" class="danger" id="clearRosterButton">Discard all signed up agents</button>
        </div>
        <div id="resultBox" class="result empty">Assignments will be stored privately against each guest's reveal code.</div>
      </form>
    </main>

    <script src="/admin.js" type="module"></script>
  </body>
</html>
